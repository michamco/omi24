<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <div class="wrap head-in">
    <a href="/" class="brand">
      <svg class="seal-mark" viewBox="0 0 64 64"><defs><radialGradient id="w1" cx="38%" cy="34%" r="72%"><stop offset="0%" stop-color="#ffc24d"/><stop offset="55%" stop-color="#e0a32e"/><stop offset="100%" stop-color="#b8791f"/></radialGradient></defs><rect width="64" height="64" rx="13" fill="#0b1626"/><path d="M32 11c5 0 7-2 10 1c3 2 2 5 4 7c2 3 5 3 5 7c0 4-3 5-4 8c-1 3 0 6-3 8c-3 2-6 0-9 1c-3 1-4 3-7 3c-4 0-5-3-8-4c-3-1-6 0-8-3c-2-3 0-6-1-9c-1-3-4-4-4-8c0-4 3-5 4-8c1-3 0-6 3-8c3-2 6 0 9-1c3-1 4-2 9-1z" fill="url(#w1)"/><path d="M22 36 L32 25 L42 36 L42 37.5 L38 37.5 L38 44 L26 44 L26 37.5 L22 37.5 Z" fill="#0b1626" opacity=".82"/></svg>
      <span class="wordmark">offmarket<span class="num">immobilien24</span><span class="tld">.de</span></span>
    </a>
    <nav class="nav"><a class="btn ghost" href="/#zugang">Zugang anfragen</a></nav>
  </div>
</header>

<div class="auth-page">
  <div class="auth-box">
    <div class="file-no">Zutritt · Mitgliederbereich</div>
    <h1>Anmelden</h1>
    <p class="lead">Geben Sie Ihre E-Mail-Adresse ein. Wir senden Ihnen einen Zugangslink — ganz ohne Passwort.</p>
    <div class="field">
      <label for="email">E-Mail-Adresse</label>
      <input type="email" id="email" placeholder="ihre@email.de" autocomplete="email">
    </div>
    <button class="btn block" id="loginBtn">Zugangslink senden <span class="arr">→</span></button>
    <div class="msg" id="msg"></div>
    <p class="hint">Noch kein Mitglied? <a href="/#zugang">Zugang anfragen</a></p>
  </div>
</div>

<script src="/config.js"></script>
<script>
const params=new URLSearchParams(location.search),msg=document.getElementById('msg');
if(params.get('fehler')){msg.className='msg err';msg.textContent='Der Zugangslink ist ungültig oder abgelaufen. Bitte fordern Sie einen neuen an.';}
const btn=document.getElementById('loginBtn');
btn.addEventListener('click',async()=>{
  const email=document.getElementById('email').value.trim();
  msg.className='msg';
  if(!email||!email.includes('@')){msg.className='msg err';msg.textContent='Bitte geben Sie eine gültige E-Mail-Adresse ein.';return;}
  btn.disabled=true;btn.textContent='Wird gesendet…';
  try{
    await fetch(API_BASE+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    msg.className='msg ok';msg.textContent='Wenn ein Konto existiert, haben wir Ihnen einen Zugangslink geschickt. Bitte prüfen Sie Ihr Postfach.';
  }catch(e){msg.className='msg err';msg.textContent='Es ist ein Fehler aufgetreten. Bitte versuchen Sie es erneut.';}
  finally{btn.disabled=false;btn.innerHTML='Zugangslink senden <span class="arr">→</span>';}
});
</script>
</body>
</html>
